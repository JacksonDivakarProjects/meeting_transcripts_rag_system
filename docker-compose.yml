version: '3.8'

services:
  fastapi:
    build: .
    container_name: meeting_rag_api
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL}
      - HF_HOME=/app/.cache/huggingface
    volumes:
      - ./meetingbank_vector_db:/app/meetingbank_vector_db
      - ./whoosh_cache:/app/whoosh_cache
    restart: unless-stopped

  react:
    build: ./frontend
    container_name: meeting_rag_react
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src            # Hot-reloading for React code
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - fastapi
    restart: unless-stopped